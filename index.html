<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MORE｜報價計算機</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: #d6c4b0;
    background-image: radial-gradient(circle at 30% 20%, #e8d8c8 0%, #c8b09a 100%);
    display: flex;
    align-items: flex-start;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
    padding: 16px;
  }

  .calculator {
    width: 100%;
    max-width: 400px;
    background: #f5f0eb;
    border-radius: 28px;
    box-shadow:
      0 30px 60px rgba(100,70,40,0.30),
      0 8px 20px rgba(100,70,40,0.20),
      inset 0 1px 0 rgba(255,255,255,0.8),
      inset 0 -2px 4px rgba(100,70,40,0.08);
    padding: 22px 20px 26px;
  }

  /* Brand */
  .brand-bar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 14px;
  }
  .brand-left { display: flex; align-items: center; gap: 9px; }
  .brand-logo {
    width: 38px; height: 38px; border-radius: 10px; overflow: hidden;
    box-shadow: 0 2px 8px rgba(139,90,43,0.15); flex-shrink: 0;
  }
  .brand-logo img { width: 100%; height: 100%; object-fit: cover; }
  .brand-name { font-size: 13px; font-weight: 800; color: #8a6a50; }
  .brand-sub { font-size: 9px; color: #b8a090; margin-top: 1px; letter-spacing: 0.06em; }
  .btn-reset {
    border: 1.5px solid #d8c8bc; background: transparent;
    color: #b8a090; border-radius: 20px; padding: 5px 14px;
    font-size: 13px; cursor: pointer; font-weight: 700; display: none;
  }

  /* Screen */
  .screen {
    background: #eee8e0;
    border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 16px;
    min-height: 200px;
    box-shadow: inset 0 2px 6px rgba(160,120,80,0.10);
    position: relative;
    border: 1px solid #e0d8d0;
  }
  .screen-type {
    font-size: 10px; font-weight: 700; color: #b8a090;
    letter-spacing: 0.12em; margin-bottom: 6px;
  }
  .screen-items {
    font-size: 11px; color: #8a6a50; line-height: 1.8;
    max-height: 120px; overflow-y: auto; margin-bottom: 4px;
  }
  .screen-items::-webkit-scrollbar { width: 2px; }
  .screen-items::-webkit-scrollbar-thumb { background: #d0c0b0; border-radius: 2px; }
  .screen-divider { height: 1px; background: #d8d0c8; margin: 6px 0; }
  .screen-total {
    text-align: right;
    font-size: 20px; font-weight: 700;
    color: #7a5840;
    letter-spacing: 0.02em;
    display: none;
  }
  .screen-empty {
    color: #c8b8a8; font-size: 13px;
    position: absolute; bottom: 14px; right: 16px;
  }
  .item-row-screen { display: flex; justify-content: space-between; }
  .item-row-screen .iname { color: #a09080; }
  .item-row-screen .iprice { color: #7a5840; font-weight: 700; }

  /* Section label */
  .section-label {
    font-size: 10px; font-weight: 700; color: #b8a090;
    letter-spacing: 0.1em; margin-bottom: 8px; margin-top: 2px;
  }

  /* Price tabs */
  .price-tabs { display: flex; gap: 6px; margin-bottom: 14px; }
  .price-tab {
    flex: 1; padding: 9px 0; border-radius: 10px; border: none; cursor: pointer;
    background: #ede6de; color: #a08870; font-weight: 700; font-size: 13px;
    box-shadow: 0 3px 0 #d8cec4;
    transition: all 0.1s; position: relative; top: 0;
  }
  .price-tab:active { top: 2px; box-shadow: 0 1px 0 #d8cec4; }
  .price-tab.active {
    background: #c0a898; color: #fff;
    box-shadow: 0 3px 0 #a08878;
  }

  /* Button grid */
  .btn-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
  .calc-btn {
    padding: 13px 10px; border-radius: 12px; border: none; cursor: pointer;
    font-size: 13px; font-weight: 700;
    transition: all 0.1s; position: relative; top: 0;
  }
  .calc-btn:active { top: 3px; }

  .btn-product {
    background: #ede6de; color: #6a5040;
    grid-column: span 3; font-size: 14px;
    box-shadow: 0 4px 0 #d8cec4;
    border: 1px dashed #c8b8a8;
  }
  .btn-product:active { box-shadow: 0 1px 0 #d8cec4; }
  .btn-shipping {
    background: #ede6de; color: #6a5040;
    box-shadow: 0 4px 0 #d8cec4;
  }
  .btn-shipping:active { box-shadow: 0 1px 0 #d8cec4; }
  .btn-note {
    background: #ede6de; color: #6a5040;
    box-shadow: 0 4px 0 #d8cec4;
  }
  .btn-note:active { box-shadow: 0 1px 0 #d8cec4; }
  .btn-copy {
    background: #8a6a52; color: #fff;
    font-size: 15px;
    box-shadow: 0 4px 0 #6a4a38;
  }
  .btn-copy:active { box-shadow: 0 1px 0 #6a4a38; }
  .btn-summary-calc {
    background: #8a6a52; color: #fff;
    box-shadow: 0 4px 0 #6a4a38;
    font-size: 15px;
  }
  .btn-summary-calc:active { box-shadow: 0 1px 0 #6a4a38; }
  .btn-manage {
    background: #ede6de; color: #6a5040;
    box-shadow: 0 4px 0 #d8cec4;
  }
  .btn-manage:active { box-shadow: 0 1px 0 #d8cec4; }

  /* Overlays */
  .overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 100;
    display: none; align-items: flex-end;
  }
  .overlay.show { display: flex; }
  .sheet {
    background: #fff; border-radius: 20px 20px 0 0; padding: 20px;
    width: 100%; max-height: 78vh; display: flex; flex-direction: column;
    box-shadow: 0 -4px 20px rgba(139,90,43,0.12);
  }
  .sheet-title { font-size: 15px; font-weight: 800; color: #7a4a28; margin-bottom: 12px; }
  .search-input {
    width: 100%; border: 1.5px solid #DBC8B6; border-radius: 8px;
    padding: 9px 12px; font-size: 14px; background: #faf6f2; outline: none;
    margin-bottom: 8px; color: #5a4030;
  }
  .search-input:focus { border-color: #9A6852; }
  .product-list { overflow-y: auto; flex: 1; }
  .product-option {
    padding: 10px 12px; border-radius: 8px; margin-bottom: 4px;
    background: #f7f2ee; cursor: pointer;
    display: flex; justify-content: space-between; align-items: center;
  }
  .product-option:hover { background: #ede0d4; }
  .product-option-name { font-size: 14px; color: #5a4030; font-weight: 600; }
  .product-option-price { font-size: 13px; color: #C6A992; font-weight: 700; }
  .no-result { text-align: center; color: #C4B1A0; padding: 20px; }
  .btn-cancel {
    width: 100%; margin-top: 10px; padding: 12px; border-radius: 10px;
    border: 1px solid #DBC8B6; background: #fff; color: #A59482;
    cursor: pointer; font-size: 14px; font-weight: 700;
  }

  /* Manager sheet */
  .item-sheet {
    background: #fff; border-radius: 20px 20px 0 0; padding: 20px;
    width: 100%; max-height: 80vh; display: flex; flex-direction: column;
  }
  .manage-item-row {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 0; border-bottom: 1px solid #f0ebe6;
  }
  .manage-item-info { flex: 1; min-width: 0; }
  .manage-item-name { font-size: 14px; font-weight: 600; color: #5a4030; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .manage-item-unit { font-size: 12px; color: #C6A992; }
  .qty-controls { display: flex; align-items: center; gap: 6px; }
  .btn-qty {
    width: 28px; height: 28px; border-radius: 50%; border: none;
    cursor: pointer; font-size: 16px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
  }
  .btn-minus { background: #ede0d4; color: #A59482; box-shadow: 0 2px 0 #C4B1A0; }
  .btn-plus { background: #C6A992; color: #fff; box-shadow: 0 2px 0 #A59482; }
  .qty-val { font-size: 15px; font-weight: 700; color: #5a4030; min-width: 24px; text-align: center; }
  .manage-item-total { font-size: 14px; font-weight: 700; color: #7a4a28; min-width: 72px; text-align: right; }
  .btn-remove { border: none; background: none; color: #DBC8B6; cursor: pointer; font-size: 18px; padding: 0; }
  .sheet-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .btn-close-x { border: none; background: none; font-size: 22px; color: #C4B1A0; cursor: pointer; }

  /* Input modal */
  .input-modal {
    position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 200;
    display: none; align-items: center; justify-content: center; padding: 20px;
  }
  .input-modal.show { display: flex; }
  .input-box {
    background: #fff; border-radius: 20px; padding: 24px;
    width: 100%; max-width: 320px;
    box-shadow: 0 8px 32px rgba(139,90,43,0.18);
  }
  .input-box-title { font-size: 15px; font-weight: 800; color: #7a4a28; margin-bottom: 14px; }
  .modal-input {
    width: 100%; border: 1.5px solid #DBC8B6; border-radius: 8px;
    padding: 11px 14px; font-size: 16px;
    background: #faf6f2; outline: none; color: #3a2818; margin-bottom: 14px;
  }
  .modal-input:focus { border-color: #9A6852; }
  .modal-btns { display: flex; gap: 10px; }
  .modal-ok {
    flex: 1; padding: 12px; border-radius: 10px; border: none;
    background: #9A6852; color: #fff;
    font-size: 14px; font-weight: 700; cursor: pointer;
    box-shadow: 0 3px 0 #7a4a28;
  }
  .modal-cancel {
    flex: 1; padding: 12px; border-radius: 10px;
    border: 1px solid #DBC8B6; background: #fff;
    color: #A59482; font-size: 14px; font-weight: 700; cursor: pointer;
  }

  /* Summary */
  .summary-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 300;
    display: none; align-items: flex-end;
  }
  .summary-overlay.show { display: flex; }
  .summary-sheet {
    background: #fff; border-radius: 20px 20px 0 0; width: 100%;
    max-height: 85vh; display: flex; flex-direction: column;
  }
  .summary-header { padding: 20px 20px 0; display: flex; justify-content: space-between; align-items: center; }
  .summary-title { font-size: 17px; font-weight: 700; color: #7a4a28; }
  .summary-body { overflow-y: auto; flex: 1; padding: 16px 20px; }
  .price-badge {
    display: inline-block; background: #ede0d4; border-radius: 20px;
    padding: 4px 14px; font-size: 12px; font-weight: 700; color: #7a4a28; margin-bottom: 14px;
  }
  .sum-item-row { display: flex; align-items: center; padding: 10px 0; border-bottom: 1px solid #f0ebe6; }
  .sum-item-info { flex: 1; }
  .sum-item-name { font-size: 14px; font-weight: 600; color: #5a4030; }
  .sum-item-sub { font-size: 12px; color: #A59482; }
  .sum-item-right { text-align: right; }
  .sum-item-total { font-size: 15px; font-weight: 700; color: #7a4a28; }
  .sum-saved { font-size: 11px; color: #c0392b; font-weight: 700; }
  .subtotals-box { background: #faf6f2; border-radius: 12px; padding: 12px 14px; margin: 12px 0; }
  .sub-row { display: flex; justify-content: space-between; margin-bottom: 5px; }
  .sub-row:last-child { margin-bottom: 0; }
  .sub-row span:first-child { font-size: 13px; color: #A59482; }
  .sub-row span:last-child { font-size: 13px; color: #5a4030; font-weight: 600; }
  .grand-box {
    background: #7a6352;
    border-radius: 14px; padding: 16px 18px; margin-bottom: 12px;
  }
  .grand-box-row { display: flex; justify-content: space-between; align-items: center; }
  .grand-box-label { color: #DBC8B6; font-size: 15px; font-weight: 700; }
  .grand-box-amount { color: #fff; font-size: 26px; font-weight: 700; }
  .savings-row {
    margin-top: 8px; background: rgba(255,255,255,0.12); border-radius: 8px;
    padding: 6px 12px; display: none; justify-content: space-between;
  }
  .savings-row span:first-child { color: #DBC8B6; font-size: 12px; }
  .savings-row span:last-child { color: #ffd580; font-size: 15px; font-weight: 700; }
  .note-box {
    background: #faf6f2; border-radius: 10px;
    padding: 10px 14px; font-size: 13px; color: #A59482; display: none;
  }
  .summary-footer { padding: 12px 20px 28px; }
  .btn-close-summary {
    width: 100%; padding: 14px; border-radius: 12px; border: none;
    background: #C6A992; color: #fff;
    cursor: pointer; font-size: 15px; font-weight: 700;
  }

  /* Screenshot modal */
  .screenshot-overlay {
    position: fixed; inset: 0; background: #f5f0eb; z-index: 400;
    display: none; flex-direction: column;
  }
  .screenshot-overlay.show { display: flex; }
  .screenshot-wrap {
    width: 100%; height: 100%; background: #f5f0eb;
    display: flex; flex-direction: column;
  }
  /* The receipt card itself */
  .receipt-card {
    background: #f5f0eb;
    padding: 0 20px;
    overflow-y: auto;
    flex: 1;
  }
  .receipt-brand {
    display: flex; align-items: center; gap: 8px; margin-bottom: 16px;
    padding-bottom: 12px; border-bottom: 1px solid #e0d8d0;
  }
  .receipt-logo {
    width: 32px; height: 32px; border-radius: 8px; overflow: hidden; flex-shrink: 0;
  }
  .receipt-logo img { width: 100%; height: 100%; object-fit: cover; }
  .receipt-brand-name { font-size: 12px; font-weight: 800; color: #7a5840; }
  .receipt-brand-sub { font-size: 9px; color: #b8a090; }
  .receipt-badge {
    display: inline-block; background: #8a6a52; border-radius: 20px;
    padding: 3px 12px; font-size: 11px; font-weight: 700; color: #fff;
    margin-bottom: 12px;
  }
  .receipt-item {
    display: flex; justify-content: space-between; align-items: flex-start;
    padding: 7px 0; border-bottom: 1px solid #ede6de;
  }
  .receipt-item:last-child { border-bottom: none; }
  .receipt-item-left { flex: 1; }
  .receipt-item-name { font-size: 13px; font-weight: 600; color: #5a4030; }
  .receipt-item-qty { font-size: 11px; color: #a09080; margin-top: 1px; }
  .receipt-item-right { text-align: right; }
  .receipt-item-price { font-size: 13px; font-weight: 700; color: #5a4030; }
  .receipt-item-orig { font-size: 10px; color: #c0a898; text-decoration: line-through; }
  .receipt-divider { height: 1px; background: #d8d0c8; margin: 12px 0; }
  .receipt-total-row {
    display: flex; justify-content: space-between; align-items: center;
  }
  .receipt-total-label { font-size: 13px; color: #a09080; font-weight: 600; }
  .receipt-total-amount { font-size: 22px; font-weight: 800; color: #7a5840; }
  .receipt-note { font-size: 11px; color: #b8a090; margin-top: 8px; }
  .receipt-footer { font-size: 9px; color: #c0b0a0; text-align: center; margin-top: 14px; letter-spacing: 0.06em; }
  /* Action buttons below card */
  .screenshot-actions { display: flex; gap: 10px; }
  .btn-screenshot {
    flex: 1; padding: 14px; border-radius: 14px; border: none;
    background: #8a6a52; color: #fff;
    font-size: 14px; font-weight: 700; cursor: pointer;
    box-shadow: 0 4px 0 #6a4a38;
  }
  .btn-screenshot-cancel {
    flex: 1; padding: 14px; border-radius: 14px;
    border: 1.5px solid #d8c8bc; background: #fff;
    color: #a08870; font-size: 14px; font-weight: 700; cursor: pointer;
  }
  .fab-copy-code:active { transform: scale(0.95); }
  .fab-copy-code.done { background: #c0a898; }

  .fab-copy-code {
    position: fixed;
    bottom: 28px; right: 20px;
    background: #8a6a52; color: #fff;
    border: none; border-radius: 28px;
    padding: 12px 20px;
    font-size: 14px; font-weight: 700;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(100,70,40,0.35);
    z-index: 50;
    display: flex; align-items: center; gap: 7px;
    transition: all 0.1s;
  }
  .fab-copy-code:active { transform: scale(0.95); }
  .fab-copy-code.done { background: #c0a898; }
</style>
</head>

const PRICE_LABELS = ["原價", "優惠價", "VIP價"];
const ntd = n => `NT$${Number(n).toLocaleString()}`;

let priceType = 0, items = [], shipping = 0, note = "";

function setPriceType(t) {
  priceType = t;
  document.querySelectorAll('.price-tab').forEach((b,i) => b.classList.toggle('active', i===t));
  document.getElementById('screenType').textContent = '產品（' + PRICE_LABELS[t] + '）';
  updateScreen();
}

function updateScreen() {
  const total = items.reduce((s,i) => s + i.prices[priceType]*i.qty, 0);
  const grand = total + shipping;
  const elItems = document.getElementById('screenItems');
  const elTotal = document.getElementById('screenTotal');
  const elDivider = document.getElementById('screenDivider');
  const elEmpty = document.getElementById('screenEmpty');
  const btnReset = document.getElementById('btnReset');

  if (items.length === 0) {
    elItems.innerHTML = '';
    elTotal.style.display = 'none';
    elDivider.style.display = 'none';
    elEmpty.style.display = 'block';
    btnReset.style.display = 'none';
    const noteBtnZ = document.getElementById('noteIndicator');
    if (noteBtnZ) noteBtnZ.textContent = note ? '備註：' + note : '備註';
    return;
  }
  elEmpty.style.display = 'none';
  btnReset.style.display = 'block';
  const noteBtn = document.getElementById('noteIndicator');
  if (noteBtn) noteBtn.textContent = note ? '備註：' + note : '備註';
  elItems.innerHTML = items.map(i => {
    const discounted = i.prices[priceType] * i.qty;
    const original = i.prices[0] * i.qty;
    const origLabel = priceType > 0
      ? `<span style="font-size:9px;color:#c0a898;text-decoration:line-through;margin-right:3px;">原價 ${ntd(original)}</span>`
      : '';
    return `<div class="item-row-screen">
      <span class="iname">${i.name} ×${i.qty}</span>
      <span style="display:flex;align-items:center;gap:2px;">${origLabel}<span class="iprice">${ntd(discounted)}</span></span>
    </div>`;
  }).join('') +
  (shipping > 0 ? `<div class="item-row-screen"><span class="iname">運費</span><span class="iprice">${ntd(shipping)}</span></div>` : '') +
  (note ? `<div style="color:#8a7050;font-size:10px;margin-top:2px">📝 ${note}</div>` : '');
  elDivider.style.display = 'block';
  elTotal.style.display = 'block';
  elTotal.textContent = ntd(grand);
}

function handleReset() {
  items = []; shipping = 0; note = "";
  document.getElementById('shippingInput').value = '';
  document.getElementById('noteInput').value = '';
  updateScreen();
}

function handleCopy() {
  if (items.length === 0) return;
  openScreenshot();
}

function openScreenshot() {
  const total = items.reduce(function(s,i){ return s + i.prices[priceType]*i.qty; }, 0);
  const grand = total + shipping;
  const showOrig = priceType > 0;
  const logoSrc = document.querySelector('.brand-logo img').src;

  let itemsHtml = '';
  items.forEach(function(i) {
    const price = i.prices[priceType] * i.qty;
    const orig = i.prices[0] * i.qty;
    const origHtml = (showOrig && orig !== price)
      ? '<div class="receipt-item-orig">' + ntd(orig) + '</div>'
      : '';
    itemsHtml += '<div class="receipt-item">'
      + '<div class="receipt-item-left">'
      + '<div class="receipt-item-name">' + i.name + '</div>'
      + '<div class="receipt-item-qty">× ' + i.qty + '</div>'
      + '</div>'
      + '<div class="receipt-item-right">'
      + origHtml
      + '<div class="receipt-item-price">' + ntd(price) + '</div>'
      + '</div>'
      + '</div>';
  });

  const shipHtml = shipping > 0
    ? '<div style="display:flex;justify-content:space-between;margin-bottom:6px;">'
      + '<span class="receipt-total-label">運費</span>'
      + '<span style="font-size:13px;color:#5a4030;font-weight:600;">' + ntd(shipping) + '</span>'
      + '</div>'
    : '';

  const noteHtml = note
    ? '<div class="receipt-note">備註：' + note + '</div>'
    : '';

  const totalQty = items.reduce(function(s,i){ return s + i.qty; }, 0);
  const totalSaved = showOrig
    ? items.reduce(function(s,i){ return s + (i.prices[0] - i.prices[priceType]) * i.qty; }, 0)
    : 0;

  const savedHtml = totalSaved > 0
    ? '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">'
      + '<span style="font-size:12px;color:#c0392b;font-weight:700;">共省下</span>'
      + '<span style="font-size:14px;font-weight:800;color:#c0392b;">' + ntd(totalSaved) + '</span>'
      + '</div>'
    : '';

  document.getElementById('receiptCard').innerHTML =
    '<div class="receipt-brand">'
    + '<div class="receipt-logo"><img src="' + logoSrc + '"></div>'
    + '<div><div class="receipt-brand-name">報價計算機</div>'
    + '<div class="receipt-brand-sub">JEROSSE · 照顧健康與美的自信</div></div>'
    + '</div>'
    + '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">'
    + '<div class="receipt-badge" style="margin-bottom:0;">' + PRICE_LABELS[priceType] + '</div>'
    + '<span style="font-size:11px;color:#a09080;font-weight:600;">共 ' + totalQty + ' 項商品</span>'
    + '</div>'
    + '<div>' + itemsHtml + '</div>'
    + '<div class="receipt-divider"></div>'
    + shipHtml
    + savedHtml
    + '<div class="receipt-total-row">'
    + '<span class="receipt-total-label">合計</span>'
    + '<span class="receipt-total-amount">' + ntd(grand) + '</span>'
    + '</div>'
    + noteHtml
    + '<div class="receipt-footer">感謝您的購買 · MORE</div>';

  document.getElementById('screenshotOverlay').classList.add('show');
}

function closeScreenshot() {
  document.getElementById('screenshotOverlay').classList.remove('show');
}


function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y); ctx.arcTo(x+w, y, x+w, y+r, r);
  ctx.lineTo(x+w, y+h-r); ctx.arcTo(x+w, y+h, x+w-r, y+h, r);
  ctx.lineTo(x+r, y+h); ctx.arcTo(x, y+h, x, y+h-r, r);
  ctx.lineTo(x, y+r); ctx.arcTo(x, y, x+r, y, r);
  ctx.closePath();
}

function openPicker() {
  document.getElementById('searchInput').value = '';
  renderPickerList();
  document.getElementById('pickerOverlay').classList.add('show');
  setTimeout(() => document.getElementById('searchInput').focus(), 100);
}
function closePicker() { document.getElementById('pickerOverlay').classList.remove('show'); }
function addItem(name) {
  const p = PRODUCTS.find(x => x.name === name);
  if (!p) return;
  const exist = items.find(i => i.name === name);
  if (exist) items = items.map(i => i.name===name ? {...i, qty: i.qty+1} : i);
  else items = [...items, {name: p.name, prices: p.prices, qty: 1}];
  closePicker(); updateScreen();
}
function renderPickerList() {
  const search = document.getElementById('searchInput').value;
  const existing = new Set(items.map(i => i.name));
  const filtered = PRODUCTS.filter(p => p.name.includes(search) && !existing.has(p.name));
  const list = document.getElementById('pickerList');
  if (filtered.length === 0) { list.innerHTML = '<div class="no-result">找不到商品</div>'; return; }
  list.innerHTML = filtered.map(p => `
    <div class="product-option" onclick="addItem('${p.name}')">
      <span class="product-option-name">${p.name}</span>
      <span class="product-option-price">${ntd(p.prices[priceType])}</span>
    </div>`).join('');
}

function openManager() {
  renderManagerList();
  document.getElementById('managerOverlay').classList.add('show');
}
function closeManager() { document.getElementById('managerOverlay').classList.remove('show'); updateScreen(); }
function updateQty(name, qty) {
  if (qty <= 0) items = items.filter(i => i.name !== name);
  else items = items.map(i => i.name===name ? {...i, qty} : i);
  renderManagerList(); updateScreen();
}
function removeItem(name) {
  items = items.filter(i => i.name !== name);
  renderManagerList(); updateScreen();
}
function renderManagerList() {
  const list = document.getElementById('managerList');
  if (items.length === 0) { list.innerHTML = '<div class="no-result">尚無商品</div>'; return; }
  list.innerHTML = items.map(item => {
    const price = item.prices[priceType];
    return `<div class="manage-item-row">
      <div class="manage-item-info">
        <div class="manage-item-name">${item.name}</div>
        <div class="manage-item-unit">${ntd(price)} / 件</div>
      </div>
      <div class="qty-controls">
        <button class="btn-qty btn-minus" onclick="updateQty('${item.name}',${item.qty-1})">−</button>
        <span class="qty-val">${item.qty}</span>
        <button class="btn-qty btn-plus" onclick="updateQty('${item.name}',${item.qty+1})">＋</button>
      </div>
      <div class="manage-item-total">${ntd(price*item.qty)}</div>
      <button class="btn-remove" onclick="removeItem('${item.name}')">✕</button>
    </div>`;
  }).join('');
}

function openShipping() {
  document.getElementById('shippingModal').classList.add('show');
  setTimeout(() => document.getElementById('shippingInput').focus(), 100);
}
function closeShipping() { document.getElementById('shippingModal').classList.remove('show'); }
function confirmShipping() {
  shipping = Number(document.getElementById('shippingInput').value) || 0;
  closeShipping(); updateScreen();
}

function openNote() {
  document.getElementById('noteModal').classList.add('show');
  setTimeout(() => document.getElementById('noteInput').focus(), 100);
}
function closeNote() { document.getElementById('noteModal').classList.remove('show'); }
function confirmNote() {
  note = document.getElementById('noteInput').value;
  closeNote(); updateScreen();
}

function openSummary() {
  if (items.length === 0) return;
  const total = items.reduce((s,i) => s + i.prices[priceType]*i.qty, 0);
  const grand = total + shipping;
  const totalSaved = priceType > 0 ? items.reduce((s,i) => s+(i.prices[0]-i.prices[priceType])*i.qty, 0) : 0;
  document.getElementById('summaryBody').innerHTML = `
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;">
      <div class="price-badge" style="margin-bottom:0;">${PRICE_LABELS[priceType]}</div>
      <span style="font-size:12px; color:#A59482; font-weight:600;">共 ${items.reduce((s,i)=>s+i.qty,0)} 項商品</span>
    </div>
    <div>${items.map(i => {
      const u = i.prices[priceType], sv = (i.prices[0]-u)*i.qty;
      return `<div class="sum-item-row">
        <div class="sum-item-info">
          <div class="sum-item-name">${i.name}</div>
          <div class="sum-item-sub">${ntd(u)} × ${i.qty}</div>
        </div>
        <div class="sum-item-right">
          <div class="sum-item-total">${ntd(u*i.qty)}</div>
          ${sv > 0 ? `<div class="sum-saved">省 NT$${sv.toLocaleString()}</div>` : ''}
        </div>
      </div>`;
    }).join('')}</div>
    <div class="subtotals-box">
      <div class="sub-row"><span>省下金額</span><span style="color:#c0a898;">${priceType > 0 ? ntd(items.reduce((s,i)=>s+(i.prices[0]-i.prices[priceType])*i.qty,0)) : ntd(0)}</span></div>
      ${shipping > 0 ? `<div class="sub-row"><span>運費</span><span>${ntd(shipping)}</span></div>` : ''}
    </div>
    <div class="grand-box">
      <div class="grand-box-row">
        <span class="grand-box-label">總金額</span>
        <span class="grand-box-amount" style="font-size:20px;">${ntd(grand)}</span>
      </div>
    </div>
    ${note ? `<div class="note-box" style="display:block">備註：${note}</div>` : ''}
  `;
  document.getElementById('summaryOverlay').classList.add('show');
}
function closeSummary() { document.getElementById('summaryOverlay').classList.remove('show'); }

document.getElementById('screenshotOverlay').addEventListener('click', e => { if(e.target===e.currentTarget) closeScreenshot(); });
document.getElementById('pickerOverlay').addEventListener('click', e => { if(e.target===e.currentTarget) closePicker(); });
document.getElementById('managerOverlay').addEventListener('click', e => { if(e.target===e.currentTarget) closeManager(); });
document.getElementById('shippingModal').addEventListener('click', e => { if(e.target===e.currentTarget) closeShipping(); });
document.getElementById('noteModal').addEventListener('click', e => { if(e.target===e.currentTarget) closeNote(); });
document.getElementById('summaryOverlay').addEventListener('click', e => { if(e.target===e.currentTarget) closeSummary(); });
document.getElementById('shippingInput').addEventListener('keydown', e => { if(e.key==='Enter') confirmShipping(); });
document.getElementById('noteInput').addEventListener('keydown', e => { if(e.key==='Enter') confirmNote(); });



function fabCopy() {
  var btn = document.getElementById('fabCopyCode');
  var html = document.documentElement.outerHTML;
  var blob = new Blob([html], {type: 'text/html;charset=utf-8'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'more-pricing-app.html';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(function(){ URL.revokeObjectURL(url); }, 1000);
  btn.innerHTML = '<span>✅</span><span>已下載！</span>';
  btn.classList.add('done');
  setTimeout(function(){
    btn.innerHTML = '<span>📋</span><span>複製程式碼</span>';
    btn.classList.remove('done');
  }, 2500);
}

</script>

</div>

  const code = document.documentElement.outerHTML;
  navigator.clipboard.writeText(code).then(function() {
    const btn = document.getElementById('copyCodeBtn');
    btn.textContent = '已複製！';
    setTimeout(function(){ btn.textContent = '複製程式碼'; }, 2000);
  }).catch(function() {
    alert('複製失敗，請手動選取原始碼');
  });
}
// Expose function globally so it can be triggered externally if needed
